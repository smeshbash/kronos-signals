; ─────────────────────────────────────────────────────────────────────────────
; Kronos Trading System — Supervisord Configuration
; Target: Linux Ubuntu VPS (Hostinger Singapore, 4 GB RAM)
;
; Deploy checklist:
;   1. Copy entire project to /app/kronos/
;   2. Create virtualenv: python3 -m venv /app/venv
;   3. Install deps:      /app/venv/bin/pip install -r requirements.txt
;   4. Copy .env.example → /app/kronos/.env, fill in all secrets
;   5. Create log dir:    sudo mkdir -p /var/log/kronos && sudo chown kronos:kronos /var/log/kronos
;   6. Create data dir:   mkdir -p /app/kronos/data/reports
;   7. Create models dir: mkdir -p /app/kronos/models
;   8. Run once to init DB: cd /app/kronos && /app/venv/bin/python -c "from db import init_db; init_db()"
;   9. Start:             sudo supervisord -c /app/kronos/supervisord.conf
;  10. Status:            sudo supervisorctl -c /app/kronos/supervisord.conf status
;
; SECURITY: API keys are loaded from /app/kronos/.env via the environment directive.
;           Never commit .env to version control.
;
; Process names match Module 11 auto-restart expectations:
;   kronos-data-collection   (Module 1)
;   kronos-slippage-model    (Module 2)
;   kronos-signal-generator  (Module 4)
;   kronos-risk-check        (Module 5)
;   kronos-execution         (Module 6)
;   kronos-position-monitor  (Module 7)
;   kronos-portfolio-manager (Module 8)
;   kronos-tax-tracker       (Module 9)
;   kronos-notifier          (Module 10)
;   kronos-health-monitor    (Module 11)
;
; Module 3 (macro_calendar.py) is a library — no standalone process.
; ─────────────────────────────────────────────────────────────────────────────

[unix_http_server]
file=/tmp/kronos-supervisor.sock
chmod=0700

[supervisord]
logfile=/var/log/kronos/supervisord.log
logfile_maxbytes=20MB
logfile_backups=5
loglevel=info
nodaemon=false
pidfile=/tmp/kronos-supervisord.pid
user=kronos

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/kronos-supervisor.sock

; ─────────────────────────────────────────────────────────────────────────────
; Shared environment — loaded by all programs
; Secrets are read from /app/kronos/.env at supervisord start time.
; Add any new env vars here so all modules see them.
; ─────────────────────────────────────────────────────────────────────────────

; NOTE: supervisord does not natively source .env files. Use one of:
;   Option A (recommended): set secrets via system /etc/environment or
;                            a systemd EnvironmentFile before starting supervisord.
;   Option B: inline secrets below (NOT recommended — visible in process list).
;
; The environment below lists all non-secret vars with their defaults.
; Override any of these in your systemd unit or login profile before starting.

[program:kronos-data-collection]
command=/app/venv/bin/python /app/kronos/01_data_collection.py
directory=/app/kronos
user=kronos
autostart=true
autorestart=true
startretries=5
startsecs=10
stopwaitsecs=30
stdout_logfile=/var/log/kronos/01_data_collection.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=5
stderr_logfile=/var/log/kronos/01_data_collection.err
stderr_logfile_maxbytes=10MB
environment=
    KRONOS_DB_PATH="/app/kronos/data/kronos.db",
    KRONOS_PAPER_MODE="%(ENV_KRONOS_PAPER_MODE)s",
    KRONOS_API_KEY="%(ENV_KRONOS_API_KEY)s",
    KRONOS_API_SECRET="%(ENV_KRONOS_API_SECRET)s"

