; Process group — allows: supervisorctl restart kronos:*
; ─────────────────────────────────────────────────────────────────────────────

[group:kronos]
programs=kronos-data-collection,kronos-slippage-model,kronos-signal-generator,kronos-risk-check,kronos-execution,kronos-position-monitor,kronos-portfolio-manager,kronos-tax-tracker,kronos-notifier,kronos-health-monitor,kronos-dashboard,kronos-mini-4h-generator,kronos-base-4h-generator,kronos-cloudflared

; ── Cloudflare Tunnel — expose dashboard :8050 ───────────────────────────────
; Uses a quick tunnel (no account needed). URL changes on each restart.
; Find the URL: grep -i "trycloudflare.com" /var/log/kronos/cloudflared.log
[program:kronos-cloudflared]
command=/usr/local/bin/cloudflared tunnel --url http://localhost:8050
directory=/app/kronos
user=kronos
autostart=true
autorestart=true
startretries=5
startsecs=5
stopwaitsecs=10
redirect_stderr=true
stdout_logfile=/var/log/kronos/cloudflared.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
